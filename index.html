<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherPulse 🌤️</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; transition: background 0.5s ease-in-out; }
  </style>
</head>
<body class="bg-blue-100 min-h-screen flex flex-col items-center justify-start p-4">

  <!-- Container -->
  <div class="max-w-xl w-full bg-gradient-to-b from-blue-200 via-blue-100 to-white shadow-2xl rounded-2xl p-6 mt-10 transition-all duration-500">

    <!-- Logo + Title -->
    <div class="flex items-center mb-6">
      <img src="https://cdn-icons-png.flaticon.com/512/1116/1116453.png" alt="WeatherPulse Logo" class="w-12 h-12 mr-3">
      <h1 class="text-3xl font-bold">WeatherPulse 🌤️</h1>
    </div>

    <p class="text-center text-gray-700 mb-4">Check current weather & 5-day forecast anywhere!</p>

    <!-- Search Form -->
    <form id="weather-form" class="flex mb-6 relative">
      <input type="text" id="city-input" placeholder="Enter city..."
             class="flex-1 px-4 py-3 rounded-l-full border focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-500">
      <button type="submit" class="bg-blue-500 text-white px-4 py-3 rounded-r-full hover:bg-blue-600 transition-colors flex items-center gap-2">
        <span>Search</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M5 11a6 6 0 1112 0 6 6 0 01-12 0z" />
        </svg>
      </button>
    </form>

    <!-- Current Weather -->
    <div id="weather-result" class="hidden bg-gradient-to-br from-white via-blue-50 to-white p-6 rounded-2xl shadow-lg mb-6">
      <h2 id="city-name" class="text-2xl font-bold mb-2 text-center"></h2>
      <div class="flex flex-col items-center mb-4">
        <img id="weather-icon" class="w-28 h-28 mb-2" src="" alt="weather icon">
        <p id="temperature" class="text-4xl font-bold mb-1"></p>
        <p id="weather" class="text-lg text-gray-700 mb-1"></p>
      </div>
      <div class="flex justify-around text-sm text-gray-600 mb-2">
        <p id="humidity">Humidity: </p>
        <p id="feels-like">Feels like: </p>
        <p id="wind">Wind: </p>
      </div>
      <div class="flex justify-around text-sm text-gray-600">
        <p id="uv">UV Index: </p>
        <p id="sunrise">Sunrise: </p>
        <p id="sunset">Sunset: </p>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <h3 class="text-lg font-semibold mb-2 hidden" id="forecast-title">5-Day Forecast</h3>
    <div id="forecast" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 mb-4 hidden"></div>

    <!-- Footer -->
    <p class="text-center text-gray-500 mt-4 text-sm">WeatherPulse | By Dipra</p>
  </div>

    <script src="script.js"></script>
</body>
</html>
